<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  
  <!-- Fond mauve arrondi -->
  <rect x="0" y="0" width="192" height="192" rx="40" ry="40" fill="url(#bgGradient)"/>
  
  <!-- Bot icon (Lucide style) centré et agrandi -->
  <g transform="translate(48, 48)" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Corps principal du robot -->
    <rect x="12" y="28" width="72" height="56" rx="8" ry="8"/>
    <!-- Yeux -->
    <circle cx="36" cy="52" r="6" fill="#ffffff"/>
    <circle cx="60" cy="52" r="6" fill="#ffffff"/>
    <!-- Antenne -->
    <line x1="48" y1="12" x2="48" y2="28"/>
    <circle cx="48" cy="10" r="6"/>
    <!-- Oreilles/côtés -->
    <line x1="4" y1="48" x2="12" y2="48"/>
    <line x1="84" y1="48" x2="92" y2="48"/>
    <line x1="4" y1="64" x2="12" y2="64"/>
    <line x1="84" y1="64" x2="92" y2="64"/>
  </g>
</svg>