<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  
  <!-- Fond mauve arrondi -->
  <rect x="0" y="0" width="48" height="48" rx="10" ry="10" fill="url(#bgGradient)"/>
  
  <!-- Bot icon (Lucide style) centré -->
  <g transform="translate(12, 12)" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Corps principal du robot -->
    <rect x="3" y="7" width="18" height="14" rx="2" ry="2"/>
    <!-- Yeux -->
    <circle cx="9" cy="13" r="1.5" fill="#ffffff"/>
    <circle cx="15" cy="13" r="1.5" fill="#ffffff"/>
    <!-- Antenne -->
    <line x1="12" y1="3" x2="12" y2="7"/>
    <circle cx="12" cy="2.5" r="1.5"/>
    <!-- Oreilles/côtés -->
    <line x1="1" y1="12" x2="3" y2="12"/>
    <line x1="21" y1="12" x2="23" y2="12"/>
    <line x1="1" y1="16" x2="3" y2="16"/>
    <line x1="21" y1="16" x2="23" y2="16"/>
  </g>
</svg>