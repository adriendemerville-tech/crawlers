<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <!-- Gradient principal violet -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <!-- Contour adaptatif pour dark/light mode -->
    <linearGradient id="strokeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
  </defs>
  
  <!-- Fond avec contour pour visibilité multi-mode -->
  <rect x="2" y="2" width="44" height="44" rx="10" ry="10" 
        fill="url(#primaryGradient)" 
        stroke="url(#strokeGradient)" 
        stroke-width="2"/>
  
  <!-- Icône robot/crawler stylisée -->
  <g fill="#ffffff">
    <!-- Tête du robot -->
    <rect x="14" y="12" width="20" height="14" rx="3" ry="3"/>
    <!-- Yeux -->
    <circle cx="20" cy="19" r="2.5" fill="#7c3aed"/>
    <circle cx="28" cy="19" r="2.5" fill="#7c3aed"/>
    <!-- Antenne -->
    <line x1="24" y1="8" x2="24" y2="12" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <circle cx="24" cy="7" r="2" fill="#ffffff"/>
    <!-- Corps -->
    <rect x="16" y="28" width="16" height="10" rx="2" ry="2"/>
    <!-- Pattes/lignes de crawl -->
    <line x1="12" y1="32" x2="16" y2="32" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <line x1="32" y1="32" x2="36" y2="32" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="36" x2="16" y2="36" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <line x1="32" y1="36" x2="36" y2="36" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>