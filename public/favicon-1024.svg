<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGradient" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a853"/>
      <stop offset="25%" style="stop-color:#8b5cf6"/>
      <stop offset="75%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#3b5998"/>
    </linearGradient>
  </defs>
  
  <!-- Fond avec dégradé mauve, or en haut à droite, bleu en bas -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" ry="200" fill="url(#bgGradient)"/>
  
  <!-- Bot icon (Lucide style) centré et agrandi pour haute résolution -->
  <g transform="translate(256, 256)" stroke="#ffffff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Corps principal du robot -->
    <rect x="64" y="149" width="384" height="298" rx="40" ry="40"/>
    <!-- Yeux -->
    <circle cx="192" cy="277" r="32" fill="#ffffff"/>
    <circle cx="320" cy="277" r="32" fill="#ffffff"/>
    <!-- Antenne -->
    <line x1="256" y1="64" x2="256" y2="149"/>
    <circle cx="256" cy="53" r="32"/>
    <!-- Oreilles/côtés -->
    <line x1="21" y1="256" x2="64" y2="256"/>
    <line x1="448" y1="256" x2="491" y2="256"/>
    <line x1="21" y1="341" x2="64" y2="341"/>
    <line x1="448" y1="341" x2="491" y2="341"/>
  </g>
</svg>