<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  
  <!-- Fond mauve arrondi pour Apple -->
  <rect x="0" y="0" width="180" height="180" rx="36" ry="36" fill="url(#bgGradient)"/>
  
  <!-- Bot icon (Lucide style) centré -->
  <g transform="translate(45, 45)" stroke="#ffffff" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Corps principal du robot -->
    <rect x="11" y="26" width="68" height="52" rx="7" ry="7"/>
    <!-- Yeux -->
    <circle cx="34" cy="48" r="5.5" fill="#ffffff"/>
    <circle cx="56" cy="48" r="5.5" fill="#ffffff"/>
    <!-- Antenne -->
    <line x1="45" y1="11" x2="45" y2="26"/>
    <circle cx="45" cy="9" r="5.5"/>
    <!-- Oreilles/côtés -->
    <line x1="4" y1="45" x2="11" y2="45"/>
    <line x1="79" y1="45" x2="86" y2="45"/>
    <line x1="4" y1="60" x2="11" y2="60"/>
    <line x1="79" y1="60" x2="86" y2="60"/>
  </g>
</svg>