<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  
  <!-- Fond mauve arrondi -->
  <rect x="0" y="0" width="96" height="96" rx="20" ry="20" fill="url(#bgGradient)"/>
  
  <!-- Bot icon (Lucide style) centré -->
  <g transform="translate(24, 24)" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Corps principal du robot -->
    <rect x="6" y="14" width="36" height="28" rx="4" ry="4"/>
    <!-- Yeux -->
    <circle cx="18" cy="26" r="3" fill="#ffffff"/>
    <circle cx="30" cy="26" r="3" fill="#ffffff"/>
    <!-- Antenne -->
    <line x1="24" y1="6" x2="24" y2="14"/>
    <circle cx="24" cy="5" r="3"/>
    <!-- Oreilles/côtés -->
    <line x1="2" y1="24" x2="6" y2="24"/>
    <line x1="42" y1="24" x2="46" y2="24"/>
    <line x1="2" y1="32" x2="6" y2="32"/>
    <line x1="42" y1="32" x2="46" y2="32"/>
  </g>
</svg>