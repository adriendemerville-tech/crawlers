    <!-- JSON-LD Structured Data - FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Qu'est-ce qu'un crawler IA ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Un crawler IA est un robot qui parcourt le web pour collecter des données destinées à entraîner des modèles de langage (LLM) comme ChatGPT, Claude ou Gemini. Les principaux crawlers IA incluent GPTBot (OpenAI), ClaudeBot (Anthropic), Google-Extended et PerplexityBot."
          }
        },
        {
          "@type": "Question",
          "name": "Qu'est-ce que le score GEO ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Le score GEO (Generative Engine Optimization) mesure l'optimisation de votre site pour les moteurs de recherche génératifs comme ChatGPT, Claude et Perplexity. Un score élevé signifie que votre contenu sera mieux compris et référencé par les IA."
          }
        },
        {
          "@type": "Question",
          "name": "Comment bloquer ou autoriser les bots IA sur mon site ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Vous pouvez contrôler l'accès des bots IA via votre fichier robots.txt. Par exemple, pour bloquer GPTBot : 'User-agent: GPTBot' suivi de 'Disallow: /'. Pour l'autoriser : 'User-agent: GPTBot' suivi de 'Allow: /'."
          }
        },
        {
          "@type": "Question",
          "name": "Pourquoi optimiser mon site pour les crawlers IA ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Optimiser pour les crawlers IA améliore votre visibilité dans les réponses des assistants IA comme ChatGPT, Claude et Perplexity. Cela peut générer du trafic qualifié et positionner votre marque comme référence dans votre domaine."
          }
        }
      ]
    }
    </script>
